server {
  listen 80;
  server_name _;

  # Docker replaces a service IP on container recreation; resolve it per request.
  resolver 127.0.0.11 ipv6=off valid=10s;

  root /usr/share/nginx/html;
  index index.html;

  location = /api/v1/realtime/events/stream {
    set $api_gateway_upstream api-gateway:4100;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Accel-Buffering no;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$api_gateway_upstream$request_uri;
  }

  location /api/ {
    set $api_gateway_upstream api-gateway:4100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$api_gateway_upstream$request_uri;
  }

  # Independent service-admin MPA entry (path routing).
  location /service-admin {
    try_files $uri $uri/ /service-admin/index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
