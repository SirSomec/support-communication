services:
  frontend:
    build:
      context: .
      target: frontend
      args:
        VITE_ENABLE_SERVICE_ADMIN: "true"
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "8080:80"

  api-gateway:
    build:
      context: .
      target: api-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4100
      SERVICE_NAME: api-gateway
      API_VERSION: v1
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: support-communication-local
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio-password
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM: noreply@support-communication.local
      LOG_LEVEL: info
      DEMO_SERVICE_ADMIN_KEY: dev-service-admin-key
      FILE_SCAN_CALLBACK_TOKEN: ${FILE_SCAN_CALLBACK_TOKEN:-dev-service-admin-key}
      PROVIDER_CREDENTIAL_MASTER_KEY: ${PROVIDER_CREDENTIAL_MASTER_KEY:-ERERERERERERERERERERERERERERERERERERERERERE=}
      PROVIDER_CREDENTIAL_KEY_VERSION: ${PROVIDER_CREDENTIAL_KEY_VERSION:-local-v1}
      # Fast local JSON mode. Use docker-compose.pilot.yml with the
      # prisma-postgres profile for the production-like PostgreSQL slice.
      IDENTITY_REPOSITORY: json
      IDENTITY_STORE_FILE: .runtime/docker/identity-store.json
      BILLING_REPOSITORY: json
      BILLING_STORE_FILE: .runtime/docker/billing-store.json
      CONVERSATION_REPOSITORY: json
      CONVERSATION_STORE_FILE: .runtime/docker/conversation-store.json
      WORKSPACE_REPOSITORY: json
      WORKSPACE_STORE_FILE: .runtime/docker/workspace-store.json
      ROUTING_REPOSITORY: json
      ROUTING_STORE_FILE: .runtime/docker/routing-store.json
      INTEGRATION_REPOSITORY: json
      OPERATIONS_REPOSITORY: json
      PLATFORM_REPOSITORY: json
      QUALITY_REPOSITORY: json
      AUTOMATION_STORE_FILE: .runtime/docker/automation-store.json
      INTEGRATION_STORE_FILE: .runtime/docker/integration-store.json
      NOTIFICATION_STORE_FILE: .runtime/docker/notification-store.json
      BROWSER_PUSH_PUBLIC_KEY: BJ0dA02pytrMj9D5Olp1WM4xuJ-PQIZeq01YMWSX0J6gOLWoLHhbnzLZfivD_SlSjEKBDr1a-B80aXSdYHUTyEE
      OPERATIONS_STORE_FILE: .runtime/docker/operations-store.json
      PLATFORM_STORE_FILE: .runtime/docker/platform-store.json
      QUALITY_STORE_FILE: .runtime/docker/quality-store.json
      QUALITY_AI_ENABLED: ${QUALITY_AI_ENABLED:-false}
      QUALITY_AI_BASE_URL: ${QUALITY_AI_BASE_URL:-}
      QUALITY_AI_API_KEY: ${QUALITY_AI_API_KEY:-}
      QUALITY_AI_MODEL: ${QUALITY_AI_MODEL:-}
      QUALITY_AI_TIMEOUT_MS: ${QUALITY_AI_TIMEOUT_MS:-8000}
      QUALITY_AI_MAX_RETRIES: ${QUALITY_AI_MAX_RETRIES:-1}
      QUALITY_AI_RATE_LIMIT_PER_MINUTE: ${QUALITY_AI_RATE_LIMIT_PER_MINUTE:-30}
      REPORT_STORE_FILE: .runtime/docker/report-store.json
      REPORT_EXPORT_OBJECT_ROOT: .runtime/report-exports
      REPORT_EXPORT_OBJECT_STORAGE_MODE: local
      TELEGRAM_INGRESS_MODE: ${TELEGRAM_INGRESS_MODE:-polling}
      TELEGRAM_WEBHOOK_ENABLED: "false"
    ports:
      - "4101:4100"
    volumes:
      - api-gateway-runtime:/app/backend/.runtime
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4100/api/v1/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  notification-delivery-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/notifications/notification-delivery.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: development
      LOCAL_DEVELOPMENT_SEED_ENABLED: "true"
      SERVICE_NAME: notification-delivery-worker
      NOTIFICATION_STORE_FILE: .runtime/docker/notification-store.json
      NOTIFICATION_DELIVERY_PROVIDER_MODE: local
      NOTIFICATION_DELIVERY_INTERVAL_MS: 10000
      NOTIFICATION_DELIVERY_LIMIT: 50
      NOTIFICATION_DELIVERY_MAX_ATTEMPTS: 3
      NOTIFICATION_DELIVERY_RETRY_DELAY_MS: 60000
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  lead-notification-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/integrations/public-demo-request-notification.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: development
      SERVICE_NAME: lead-notification-worker
      INTEGRATION_STORE_FILE: .runtime/docker/integration-store.json
      PUBLIC_DEMO_NOTIFICATION_PROVIDER_MODE: local
      PUBLIC_DEMO_NOTIFICATION_DELIVERY_INTERVAL_MS: 10000
      PUBLIC_DEMO_NOTIFICATION_DELIVERY_LIMIT: 50
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  webhook-delivery-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/integrations/webhook-delivery.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: development
      SERVICE_NAME: webhook-delivery-worker
      INTEGRATION_STORE_FILE: .runtime/docker/integration-store.json
      WEBHOOK_DELIVERY_PROVIDER_MODE: local
      WEBHOOK_DELIVERY_INTERVAL_MS: 10000
      WEBHOOK_DELIVERY_LIMIT: 50
      WEBHOOK_DELIVERY_MAX_ATTEMPTS: 3
      WEBHOOK_DELIVERY_RETRY_BACKOFF_MS: 60000
      WEBHOOK_DELIVERY_HTTP_TIMEOUT_MS: 5000
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  telegram-polling-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/integrations/telegram-polling.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: development
      SERVICE_NAME: telegram-polling-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      INTEGRATION_REPOSITORY: json
      INTEGRATION_STORE_FILE: .runtime/docker/integration-store.json
      CONVERSATION_REPOSITORY: json
      CONVERSATION_STORE_FILE: .runtime/docker/conversation-store.json
      TELEGRAM_POLLING_ENABLED: ${TELEGRAM_POLLING_ENABLED:-true}
      TELEGRAM_INGRESS_MODE: ${TELEGRAM_INGRESS_MODE:-polling}
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-https://api.telegram.org}
      TELEGRAM_POLLING_INTERVAL_MS: ${TELEGRAM_POLLING_INTERVAL_MS:-5000}
      TELEGRAM_POLLING_LIMIT: ${TELEGRAM_POLLING_LIMIT:-50}
      TELEGRAM_POLLING_TIMEOUT_MS: ${TELEGRAM_POLLING_TIMEOUT_MS:-10000}
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  proactive-delivery-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/automation/proactive-delivery.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: development
      SERVICE_NAME: proactive-delivery-worker
      AUTOMATION_REPOSITORY: json
      AUTOMATION_STORE_FILE: .runtime/docker/automation-store.json
      CONVERSATION_REPOSITORY: json
      CONVERSATION_STORE_FILE: .runtime/docker/conversation-store.json
      PROACTIVE_DELIVERY_ACTIVE_VARIANTS: A,B
      PROACTIVE_DELIVERY_INTERVAL_MS: 10000
      PROACTIVE_DELIVERY_LIMIT: 50
      PROACTIVE_DELIVERY_VISITOR_TTL_MS: 900000
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  bot-runtime-reconciliation-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/automation/bot-runtime-reconciliation.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: development
      SERVICE_NAME: bot-runtime-reconciliation-worker
      AUTOMATION_REPOSITORY: json
      AUTOMATION_STORE_FILE: .runtime/docker/automation-store.json
      CONVERSATION_REPOSITORY: json
      CONVERSATION_STORE_FILE: .runtime/docker/conversation-store.json
      BOT_RUNTIME_RECONCILIATION_INTERVAL_MS: 5000
      BOT_RUNTIME_RECONCILIATION_LEASE_MS: 30000
      BOT_RUNTIME_RECONCILIATION_LIMIT: 50
      BOT_RUNTIME_RECONCILIATION_MAX_ATTEMPTS: 5
      BOT_RUNTIME_RECONCILIATION_RETRY_MS: 5000
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  report-digest-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/reports/report-digest.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: development
      SERVICE_NAME: report-digest-worker
      REPORT_STORE_FILE: .runtime/docker/report-store.json
      REPORT_DIGEST_WORKER_INTERVAL_MS: 10000
      REPORT_DIGEST_WORKER_LIMIT: 10
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  report-export-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/reports/report-export.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      SERVICE_NAME: report-export-worker
      REPORT_STORE_FILE: .runtime/docker/report-store.json
      REPORT_EXPORT_OBJECT_ROOT: .runtime/report-exports
      REPORT_EXPORT_OBJECT_STORAGE_MODE: local
      REPORT_EXPORT_WORKER_INTERVAL_MS: 10000
      REPORT_EXPORT_WORKER_LIMIT: 10
      REPORT_EXPORT_WORKER_QUEUE: report-export
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  sla-timer-worker:
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/routing/sla-timer.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: development
      SERVICE_NAME: sla-timer-worker
      ROUTING_REPOSITORY: json
      ROUTING_STORE_FILE: .runtime/docker/routing-store.json
      SLA_TIMER_WORKER_HEALTH_PORT: 4110
      SLA_TIMER_WORKER_INTERVAL_MS: 5000
      SLA_TIMER_WORKER_LIMIT: 50
      SLA_TIMER_WORKER_MAX_ATTEMPTS: 5
      SLA_TIMER_WORKER_RETRY_BACKOFF_MS: 60000
    volumes:
      - api-gateway-runtime:/app/backend/.runtime
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4110/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  rescue-return-worker:
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/routing/rescue-return.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: development
      SERVICE_NAME: rescue-return-worker
      ROUTING_REPOSITORY: json
      ROUTING_STORE_FILE: .runtime/docker/routing-store.json
      RESCUE_RETURN_WORKER_HEALTH_PORT: 4110
      RESCUE_RETURN_WORKER_INTERVAL_MS: 5000
      RESCUE_RETURN_WORKER_LIMIT: 50
      RESCUE_RETURN_WORKER_MAX_ATTEMPTS: 5
      RESCUE_RETURN_WORKER_RETRY_BACKOFF_MS: 60000
    volumes:
      - api-gateway-runtime:/app/backend/.runtime
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4110/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  outbox-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/outbox-worker/dist/main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: development
      SERVICE_NAME: outbox-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      INTEGRATION_STORE_FILE: .runtime/docker/integration-store.json
      OUTBOX_QUEUE: message-delivery
      OUTBOX_POLL_INTERVAL_MS: 10000
      OUTBOX_BATCH_SIZE: 50
      OUTBOX_MAX_ATTEMPTS: 5
      OUTBOX_RETRY_BACKOFF_MS: 60000
      OUTBOX_HTTP_TIMEOUT_MS: 5000
      OUTBOX_CHANNEL_CONNECTORS: ${OUTBOX_CHANNEL_CONNECTORS:-}
      OUTBOX_TELEGRAM_ENABLED: ${OUTBOX_TELEGRAM_ENABLED:-false}
      OUTBOX_TELEGRAM_CHANNEL: ${OUTBOX_TELEGRAM_CHANNEL:-Telegram}
      OUTBOX_TELEGRAM_API_BASE_URL: ${OUTBOX_TELEGRAM_API_BASE_URL:-https://api.telegram.org}
      OUTBOX_TELEGRAM_BOT_TOKEN: ${OUTBOX_TELEGRAM_BOT_TOKEN:-}
      PROVIDER_CREDENTIAL_MASTER_KEY: ${PROVIDER_CREDENTIAL_MASTER_KEY:-ERERERERERERERERERERERERERERERERERERERERERE=}
      OUTBOX_VK_ENABLED: ${OUTBOX_VK_ENABLED:-false}
      OUTBOX_VK_ENDPOINT: ${OUTBOX_VK_API_BASE_URL:-https://api.vk.com}
      OUTBOX_VK_CHANNEL: VK
      OUTBOX_MAX_ENABLED: ${OUTBOX_MAX_ENABLED:-false}
      OUTBOX_MAX_ENDPOINT: ${OUTBOX_MAX_API_BASE_URL:-https://platform-api2.max.ru}
      OUTBOX_MAX_CHANNEL: MAX
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  identity-events-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/outbox-worker/dist/main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: development
      SERVICE_NAME: identity-events-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      OUTBOX_QUEUE: identity-events
      OUTBOX_POLL_INTERVAL_MS: 10000
      OUTBOX_BATCH_SIZE: 50
      OUTBOX_MAX_ATTEMPTS: 5
      OUTBOX_RETRY_BACKOFF_MS: 60000

  billing-sync-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/outbox-worker/dist/main.js", "--billing-sync"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: development
      SERVICE_NAME: billing-sync-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      BILLING_SYNC_WORKER: "true"
      BILLING_SYNC_PROVIDER_MODE: ${BILLING_SYNC_PROVIDER_MODE:-local}
      BILLING_SYNC_PROVIDER_URL: ${BILLING_SYNC_PROVIDER_URL:-}
      OUTBOX_QUEUE: billing-sync
      OUTBOX_POLL_INTERVAL_MS: 10000
      OUTBOX_BATCH_SIZE: 50
      OUTBOX_MAX_ATTEMPTS: 5
      OUTBOX_RETRY_BACKOFF_MS: 60000

  file-scan-scanner-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/outbox-worker/dist/main.js", "--file-scan-scanner"]
    depends_on:
      api-gateway:
        condition: service_healthy
      clamav-scanner:
        condition: service_healthy
    environment:
      NODE_ENV: development
      SERVICE_NAME: file-scan-scanner-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      OUTBOX_FILE_SCAN_SCANNER_WORKER: "true"
      OUTBOX_QUEUE: file-scan
      OUTBOX_SCANNER_ENABLED: ${OUTBOX_SCANNER_ENABLED:-true}
      OUTBOX_SCANNER_PROVIDER_MODE: ${OUTBOX_SCANNER_PROVIDER_MODE:-http}
      OUTBOX_SCANNER_LOCAL_VERDICT: ${OUTBOX_SCANNER_LOCAL_VERDICT:-clean}
      OUTBOX_SCANNER_URL: ${OUTBOX_SCANNER_URL:-http://clamav-scanner:4120/scan}
      OUTBOX_SCANNER_BEARER_TOKEN: ${OUTBOX_SCANNER_BEARER_TOKEN:-}
      OUTBOX_FILE_SCAN_RESULT_BASE_URL: ${OUTBOX_FILE_SCAN_RESULT_BASE_URL:-http://api-gateway:4100/api/v1}
      OUTBOX_FILE_SCAN_RESULT_BEARER_TOKEN: ${FILE_SCAN_CALLBACK_TOKEN:-dev-service-admin-key}
      OUTBOX_POLL_INTERVAL_MS: 10000
      OUTBOX_BATCH_SIZE: 50

  clamav-scanner:
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/outbox-worker/dist/clamav-scanner.main.js"]
    depends_on:
      clamav:
        condition: service_healthy
    environment:
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      CLAMAV_SCANNER_HTTP_PORT: 4120
      CLAMAV_MAX_FILE_BYTES: 20971520
    ports:
      - "14120:4120"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4120/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  clamav:
    image: clamav/clamav:1.4
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "printf 'zPING\\0' | nc -w 2 127.0.0.1 3310 | grep -q PONG"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: support_communication
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support
    ports:
      - "56432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support -d support_communication"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-password
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mc alias set local http://minio:9000 minio minio-password
      && mc mb --ignore-existing local/support-communication-local"

  mailpit:
    image: axllent/mailpit:v1.22
    ports:
      - "11025:1025"
      - "18025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  api-gateway-runtime:
  clamav-data:
  postgres-data:
  redis-data:
  minio-data:
