services:
  frontend:
    build:
      context: .
      target: frontend
      args:
        VITE_DEMO_SERVICE_ADMIN_KEY: dev-service-admin-key
        VITE_ENABLE_SERVICE_ADMIN: "true"
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "8080:80"

  api-gateway:
    build:
      context: .
      target: api-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4100
      SERVICE_NAME: api-gateway
      API_VERSION: v1
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: support-communication-local
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio-password
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      LOG_LEVEL: info
      DEMO_SERVICE_ADMIN_KEY: dev-service-admin-key
      IDENTITY_REPOSITORY: json
      IDENTITY_STORE_FILE: .runtime/docker/identity-store.json
      BILLING_REPOSITORY: json
      BILLING_STORE_FILE: .runtime/docker/billing-store.json
      CONVERSATION_REPOSITORY: json
      CONVERSATION_STORE_FILE: .runtime/docker/conversation-store.json
      WORKSPACE_REPOSITORY: json
      WORKSPACE_STORE_FILE: .runtime/docker/workspace-store.json
      ROUTING_REPOSITORY: json
      ROUTING_STORE_FILE: .runtime/docker/routing-store.json
      AUTOMATION_STORE_FILE: .runtime/docker/automation-store.json
      INTEGRATION_STORE_FILE: .runtime/docker/integration-store.json
      OPERATIONS_STORE_FILE: .runtime/docker/operations-store.json
      PLATFORM_STORE_FILE: .runtime/docker/platform-store.json
      REPORT_STORE_FILE: .runtime/docker/report-store.json
    ports:
      - "4101:4100"
    volumes:
      - api-gateway-runtime:/app/backend/.runtime
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4100/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: support_communication
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support
    ports:
      - "56432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support -d support_communication"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-password
    ports:
      - "59000:9000"
      - "59001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.22
    ports:
      - "11025:1025"
      - "18025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  api-gateway-runtime:
  postgres-data:
  redis-data:
  minio-data:
