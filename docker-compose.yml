services:
  frontend:
    build:
      context: .
      target: frontend
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "8080:80"

  api-gateway:
    build:
      context: .
      target: api-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      LOCAL_DEVELOPMENT_SEED_ENABLED: "false"
      PORT: 4100
      SERVICE_NAME: api-gateway
      API_VERSION: v1
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      REDIS_URL: redis://redis:6379
      REALTIME_REDIS_FANOUT_ENABLED: ${REALTIME_REDIS_FANOUT_ENABLED:-true}
      REALTIME_REDIS_CHANNEL: ${REALTIME_REDIS_CHANNEL:-support:realtime}
      # Presigned URL host must be reachable both from the host browser
      # (attachment PUT/GET) and from containers (clamav-scanner download).
      # kubernetes.docker.internal maps to 127.0.0.1 in the Docker Desktop
      # hosts file and to the host gateway inside containers via extra_hosts.
      S3_ENDPOINT: ${S3_ENDPOINT:-http://kubernetes.docker.internal:19000}
      S3_BUCKET: support-communication-local
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio-password
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM: noreply@support-communication.local
      LOG_LEVEL: info
      DEMO_SERVICE_ADMIN_KEY: local-dev-service-admin-key
      FILE_SCAN_CALLBACK_TOKEN: ${FILE_SCAN_CALLBACK_TOKEN:-local-dev-service-admin-key}
      JWT_ACCESS_SECRET: local-dev-access-secret-16
      JWT_REFRESH_SECRET: local-dev-refresh-secret-16
      MFA_OTP_DELIVERY_MODE: ${MFA_OTP_DELIVERY_MODE:-smtp}
      MFA_OTP_SMTP_FROM: ${MFA_OTP_SMTP_FROM:-noreply@support-communication.local}
      MFA_OTP_SMTP_HOST: ${MFA_OTP_SMTP_HOST:-mailpit}
      MFA_OTP_SMTP_PORT: ${MFA_OTP_SMTP_PORT:-1025}
      MFA_OTP_SMTP_SECURE: ${MFA_OTP_SMTP_SECURE:-false}
      MFA_OTP_SMTP_TLS_REJECT_UNAUTHORIZED: ${MFA_OTP_SMTP_TLS_REJECT_UNAUTHORIZED:-true}
      PUBLIC_API_KEY_SECRET: local-dev-public-api-secret
      PROVIDER_CREDENTIAL_MASTER_KEY: ${PROVIDER_CREDENTIAL_MASTER_KEY:-ERERERERERERERERERERERERERERERERERERERERERE=}
      PROVIDER_CREDENTIAL_KEY_VERSION: ${PROVIDER_CREDENTIAL_KEY_VERSION:-local-v1}
      AI_CONNECTIONS_MASTER_KEY: ${AI_CONNECTIONS_MASTER_KEY:-ERERERERERERERERERERERERERERERERERERERERERE=}
      AI_CONNECTIONS_KEY_VERSION: ${AI_CONNECTIONS_KEY_VERSION:-local-v1}
      IDENTITY_REPOSITORY: prisma
      BILLING_REPOSITORY: prisma
      CONVERSATION_REPOSITORY: prisma
      WORKSPACE_REPOSITORY: prisma
      ROUTING_REPOSITORY: prisma
      PRESENCE_REPOSITORY: prisma
      INTEGRATION_REPOSITORY: prisma
      NOTIFICATION_REPOSITORY: prisma
      OPERATIONS_REPOSITORY: prisma
      PLATFORM_REPOSITORY: prisma
      QUALITY_REPOSITORY: prisma
      QUALITY_SCORING_REPOSITORY: prisma
      AUTOMATION_REPOSITORY: prisma
      REPORT_REPOSITORY: prisma
      BROWSER_PUSH_PUBLIC_KEY: ${BROWSER_PUSH_PUBLIC_KEY:-}
      QUALITY_AI_ENABLED: ${QUALITY_AI_ENABLED:-false}
      QUALITY_AI_BASE_URL: ${QUALITY_AI_BASE_URL:-}
      QUALITY_AI_API_KEY: ${QUALITY_AI_API_KEY:-}
      QUALITY_AI_MODEL: ${QUALITY_AI_MODEL:-}
      QUALITY_AI_TIMEOUT_MS: ${QUALITY_AI_TIMEOUT_MS:-8000}
      QUALITY_AI_MAX_RETRIES: ${QUALITY_AI_MAX_RETRIES:-1}
      QUALITY_AI_RATE_LIMIT_PER_MINUTE: ${QUALITY_AI_RATE_LIMIT_PER_MINUTE:-30}
      REPORT_EXPORT_OBJECT_ROOT: .runtime/report-exports
      REPORT_EXPORT_OBJECT_STORAGE_MODE: s3
      PUBLIC_WEBHOOK_BASE_URL: ${PUBLIC_WEBHOOK_BASE_URL:-http://127.0.0.1:4100}
      OUTBOX_TELEGRAM_ENABLED: "true"
      OUTBOX_TELEGRAM_CHANNEL: Telegram
      TELEGRAM_INGRESS_MODE: polling
      TELEGRAM_WEBHOOK_ENABLED: "false"
    extra_hosts:
      - "kubernetes.docker.internal:host-gateway"
    ports:
      - "4101:4100"
    volumes:
      - api-gateway-runtime:/app/backend/.runtime
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4100/api/v1/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  bootstrap:
    build:
      context: .
      target: api-gateway
    command: ["npm", "run", "bootstrap:local"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      BOOTSTRAP_TENANT_SLUG: ${BOOTSTRAP_TENANT_SLUG:-local-client}
      BOOTSTRAP_OPERATOR_EMAIL: ${BOOTSTRAP_OPERATOR_EMAIL:-operator@local-client.test}
      BOOTSTRAP_OPERATOR_PASSWORD: ${BOOTSTRAP_OPERATOR_PASSWORD:-Local-Operator-2026!}
    restart: "no"

  notification-delivery-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/notifications/notification-delivery.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      LOCAL_DEVELOPMENT_SEED_ENABLED: "true"
      SERVICE_NAME: notification-delivery-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      NOTIFICATION_REPOSITORY: prisma
      BROWSER_PUSH_ENABLED: ${BROWSER_PUSH_ENABLED:-false}
      BROWSER_PUSH_PUBLIC_KEY: ${BROWSER_PUSH_PUBLIC_KEY:-}
      BROWSER_PUSH_PRIVATE_KEY: ${BROWSER_PUSH_PRIVATE_KEY:-}
      BROWSER_PUSH_SUBJECT: ${BROWSER_PUSH_SUBJECT:-mailto:ops@support-communication.local}
      NOTIFICATION_DELIVERY_PROVIDER_MODE: ${NOTIFICATION_DELIVERY_PROVIDER_MODE:-disabled}
      NOTIFICATION_DELIVERY_INTERVAL_MS: 10000
      NOTIFICATION_DELIVERY_LIMIT: 50
      NOTIFICATION_DELIVERY_MAX_ATTEMPTS: 3
      NOTIFICATION_DELIVERY_RETRY_DELAY_MS: 60000
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  lead-notification-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/integrations/public-demo-request-notification.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      SERVICE_NAME: lead-notification-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      INTEGRATION_REPOSITORY: prisma
      PUBLIC_DEMO_NOTIFICATION_PROVIDER_MODE: ${PUBLIC_DEMO_NOTIFICATION_PROVIDER_MODE:-smtp}
      PUBLIC_DEMO_NOTIFICATION_SMTP_FROM: ${PUBLIC_DEMO_NOTIFICATION_SMTP_FROM:-noreply@support-communication.local}
      PUBLIC_DEMO_NOTIFICATION_SMTP_HOST: ${PUBLIC_DEMO_NOTIFICATION_SMTP_HOST:-mailpit}
      PUBLIC_DEMO_NOTIFICATION_SMTP_PASSWORD: ${PUBLIC_DEMO_NOTIFICATION_SMTP_PASSWORD:-}
      PUBLIC_DEMO_NOTIFICATION_SMTP_PORT: ${PUBLIC_DEMO_NOTIFICATION_SMTP_PORT:-1025}
      PUBLIC_DEMO_NOTIFICATION_SMTP_SECURE: ${PUBLIC_DEMO_NOTIFICATION_SMTP_SECURE:-false}
      PUBLIC_DEMO_NOTIFICATION_SMTP_TLS_REJECT_UNAUTHORIZED: ${PUBLIC_DEMO_NOTIFICATION_SMTP_TLS_REJECT_UNAUTHORIZED:-true}
      PUBLIC_DEMO_NOTIFICATION_SMTP_TO: ${PUBLIC_DEMO_NOTIFICATION_SMTP_TO:-sales@support-communication.local}
      PUBLIC_DEMO_NOTIFICATION_SMTP_USERNAME: ${PUBLIC_DEMO_NOTIFICATION_SMTP_USERNAME:-}
      PUBLIC_DEMO_NOTIFICATION_DELIVERY_INTERVAL_MS: 10000
      PUBLIC_DEMO_NOTIFICATION_DELIVERY_LIMIT: 50
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  webhook-delivery-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/integrations/webhook-delivery.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      SERVICE_NAME: webhook-delivery-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      INTEGRATION_REPOSITORY: prisma
      WEBHOOK_DELIVERY_PROVIDER_MODE: ${WEBHOOK_DELIVERY_PROVIDER_MODE:-http}
      WEBHOOK_DELIVERY_SIGNING_SECRET: ${WEBHOOK_DELIVERY_SIGNING_SECRET:-local-dev-webhook-signing-secret}
      WEBHOOK_DELIVERY_INTERVAL_MS: 10000
      WEBHOOK_DELIVERY_LIMIT: 50
      WEBHOOK_DELIVERY_MAX_ATTEMPTS: 3
      WEBHOOK_DELIVERY_RETRY_BACKOFF_MS: 60000
      WEBHOOK_DELIVERY_HTTP_TIMEOUT_MS: 5000
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  telegram-polling-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/integrations/telegram-polling.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      SERVICE_NAME: telegram-polling-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      # The polling worker matches scenarios, writes side effects and reads
      # canonical operators/presence — every domain below must live in the
      # same Prisma store as the api-gateway, otherwise data is silently lost.
      AUTOMATION_REPOSITORY: prisma
      INTEGRATION_REPOSITORY: prisma
      CONVERSATION_REPOSITORY: prisma
      IDENTITY_REPOSITORY: prisma
      PRESENCE_REPOSITORY: prisma
      ROUTING_REPOSITORY: prisma
      QUALITY_REPOSITORY: prisma
      QUALITY_SCORING_REPOSITORY: prisma
      AI_CONNECTIONS_MASTER_KEY: ${AI_CONNECTIONS_MASTER_KEY:-ERERERERERERERERERERERERERERERERERERERERERE=}
      AI_CONNECTIONS_KEY_VERSION: ${AI_CONNECTIONS_KEY_VERSION:-local-v1}
      TELEGRAM_POLLING_ENABLED: ${TELEGRAM_POLLING_ENABLED:-true}
      TELEGRAM_INGRESS_MODE: polling
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-https://api.telegram.org}
      TELEGRAM_POLLING_INTERVAL_MS: ${TELEGRAM_POLLING_INTERVAL_MS:-5000}
      TELEGRAM_POLLING_LIMIT: ${TELEGRAM_POLLING_LIMIT:-50}
      TELEGRAM_POLLING_TIMEOUT_MS: ${TELEGRAM_POLLING_TIMEOUT_MS:-10000}
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  proactive-delivery-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/automation/proactive-delivery.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      SERVICE_NAME: proactive-delivery-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      AUTOMATION_REPOSITORY: prisma
      CONVERSATION_REPOSITORY: prisma
      PROACTIVE_DELIVERY_ACTIVE_VARIANTS: A,B
      PROACTIVE_DELIVERY_INTERVAL_MS: 10000
      PROACTIVE_DELIVERY_LIMIT: 50
      PROACTIVE_DELIVERY_VISITOR_TTL_MS: 900000
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  bot-runtime-reconciliation-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/automation/bot-runtime-reconciliation.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      SERVICE_NAME: bot-runtime-reconciliation-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      AUTOMATION_REPOSITORY: prisma
      CONVERSATION_REPOSITORY: prisma
      REDIS_URL: redis://redis:6379
      REALTIME_REDIS_FANOUT_ENABLED: ${REALTIME_REDIS_FANOUT_ENABLED:-true}
      REALTIME_REDIS_CHANNEL: ${REALTIME_REDIS_CHANNEL:-support:realtime}
      BOT_RUNTIME_RECONCILIATION_INTERVAL_MS: 5000
      BOT_RUNTIME_RECONCILIATION_LEASE_MS: 30000
      BOT_RUNTIME_RECONCILIATION_LIMIT: 50
      BOT_RUNTIME_RECONCILIATION_MAX_ATTEMPTS: 5
      BOT_RUNTIME_RECONCILIATION_RETRY_MS: 5000
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  knowledge-document-ingestion-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/knowledge-sources/document-ingestion.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      SERVICE_NAME: knowledge-document-ingestion-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      WORKSPACE_REPOSITORY: prisma
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: support-communication-local
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio-password
      KNOWLEDGE_DOCUMENT_INGESTION_INTERVAL_MS: 5000
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  url-source-refresh-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/knowledge-sources/url-source-refresh.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      SERVICE_NAME: url-source-refresh-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      WORKSPACE_REPOSITORY: prisma
      URL_SOURCE_REFRESH_INTERVAL_MS: 60000
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  report-digest-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/reports/report-digest.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      SERVICE_NAME: report-digest-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      REPORT_REPOSITORY: prisma
      REPORT_EXPORT_OBJECT_STORAGE_MODE: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: support-communication-local
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio-password
      REPORT_DIGEST_WORKER_INTERVAL_MS: 10000
      REPORT_DIGEST_WORKER_LIMIT: 10
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  report-export-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/reports/report-export.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      SERVICE_NAME: report-export-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      REPORT_REPOSITORY: prisma
      REPORT_EXPORT_OBJECT_ROOT: .runtime/report-exports
      REPORT_EXPORT_OBJECT_STORAGE_MODE: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: support-communication-local
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio-password
      REPORT_EXPORT_WORKER_INTERVAL_MS: 10000
      REPORT_EXPORT_WORKER_LIMIT: 10
      REPORT_EXPORT_WORKER_QUEUE: report-export
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  sla-timer-worker:
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/routing/sla-timer.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      SERVICE_NAME: sla-timer-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      ROUTING_REPOSITORY: prisma
      SLA_TIMER_WORKER_HEALTH_PORT: 4110
      SLA_TIMER_WORKER_INTERVAL_MS: 5000
      SLA_TIMER_WORKER_LIMIT: 50
      SLA_TIMER_WORKER_MAX_ATTEMPTS: 5
      SLA_TIMER_WORKER_RETRY_BACKOFF_MS: 60000
    volumes:
      - api-gateway-runtime:/app/backend/.runtime
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4110/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  rescue-return-worker:
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/api-gateway/dist/routing/rescue-return.main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      SERVICE_NAME: rescue-return-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      ROUTING_REPOSITORY: prisma
      RESCUE_RETURN_WORKER_HEALTH_PORT: 4110
      RESCUE_RETURN_WORKER_INTERVAL_MS: 5000
      RESCUE_RETURN_WORKER_LIMIT: 50
      RESCUE_RETURN_WORKER_MAX_ATTEMPTS: 5
      RESCUE_RETURN_WORKER_RETRY_BACKOFF_MS: 60000
    volumes:
      - api-gateway-runtime:/app/backend/.runtime
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4110/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  outbox-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/outbox-worker/dist/main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      SERVICE_NAME: outbox-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      INTEGRATION_REPOSITORY: prisma
      CONVERSATION_REPOSITORY: prisma
      OUTBOX_QUEUE: message-delivery
      OUTBOX_POLL_INTERVAL_MS: 10000
      OUTBOX_BATCH_SIZE: 50
      OUTBOX_MAX_ATTEMPTS: 5
      OUTBOX_RETRY_BACKOFF_MS: 60000
      OUTBOX_HTTP_TIMEOUT_MS: 5000
      OUTBOX_CHANNEL_CONNECTORS: ${OUTBOX_CHANNEL_CONNECTORS:-}
      OUTBOX_TELEGRAM_ENABLED: ${OUTBOX_TELEGRAM_ENABLED:-true}
      OUTBOX_TELEGRAM_CHANNEL: ${OUTBOX_TELEGRAM_CHANNEL:-Telegram}
      OUTBOX_TELEGRAM_API_BASE_URL: ${OUTBOX_TELEGRAM_API_BASE_URL:-https://api.telegram.org}
      OUTBOX_TELEGRAM_BOT_TOKEN: ${OUTBOX_TELEGRAM_BOT_TOKEN:-}
      PROVIDER_CREDENTIAL_MASTER_KEY: ${PROVIDER_CREDENTIAL_MASTER_KEY:-ERERERERERERERERERERERERERERERERERERERERERE=}
      OUTBOX_VK_ENABLED: ${OUTBOX_VK_ENABLED:-true}
      OUTBOX_VK_ENDPOINT: ${OUTBOX_VK_API_BASE_URL:-https://api.vk.com}
      OUTBOX_VK_CHANNEL: VK
      OUTBOX_MAX_ENABLED: ${OUTBOX_MAX_ENABLED:-true}
      OUTBOX_MAX_ENDPOINT: ${OUTBOX_MAX_API_BASE_URL:-https://platform-api2.max.ru}
      OUTBOX_MAX_CHANNEL: MAX
    # Provider attachment transfers download signed S3 URLs issued by the
    # api-gateway with the kubernetes.docker.internal endpoint.
    extra_hosts:
      - "kubernetes.docker.internal:host-gateway"
    volumes:
      - api-gateway-runtime:/app/backend/.runtime

  identity-events-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/outbox-worker/dist/main.js"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      SERVICE_NAME: identity-events-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      # The outbox runtime opens the conversation delivery store on boot; without
      # prisma here the worker dies with conversation_store_file_required.
      CONVERSATION_REPOSITORY: prisma
      OUTBOX_QUEUE: identity-events
      OUTBOX_POLL_INTERVAL_MS: 10000
      OUTBOX_BATCH_SIZE: 50
      OUTBOX_MAX_ATTEMPTS: 5
      OUTBOX_RETRY_BACKOFF_MS: 60000

  billing-sync-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/outbox-worker/dist/main.js", "--billing-sync"]
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      SERVICE_NAME: billing-sync-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      BILLING_REPOSITORY: prisma
      CONVERSATION_REPOSITORY: prisma
      BILLING_SYNC_WORKER: "true"
      BILLING_SYNC_PROVIDER_MODE: ${BILLING_SYNC_PROVIDER_MODE:-disabled}
      BILLING_SYNC_PROVIDER_URL: ${BILLING_SYNC_PROVIDER_URL:-}
      OUTBOX_QUEUE: billing-sync
      OUTBOX_POLL_INTERVAL_MS: 10000
      OUTBOX_BATCH_SIZE: 50
      OUTBOX_MAX_ATTEMPTS: 5
      OUTBOX_RETRY_BACKOFF_MS: 60000

  file-scan-scanner-worker:
    restart: unless-stopped
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/outbox-worker/dist/main.js", "--file-scan-scanner"]
    depends_on:
      api-gateway:
        condition: service_healthy
      clamav-scanner:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      RUNTIME_PROFILE: production-like
      SERVICE_NAME: file-scan-scanner-worker
      DATABASE_URL: postgresql://support:support@postgres:5432/support_communication
      CONVERSATION_REPOSITORY: prisma
      OUTBOX_FILE_SCAN_SCANNER_WORKER: "true"
      OUTBOX_QUEUE: file-scan
      OUTBOX_SCANNER_ENABLED: ${OUTBOX_SCANNER_ENABLED:-true}
      OUTBOX_SCANNER_PROVIDER_MODE: ${OUTBOX_SCANNER_PROVIDER_MODE:-http}
      OUTBOX_SCANNER_LOCAL_VERDICT: ${OUTBOX_SCANNER_LOCAL_VERDICT:-clean}
      OUTBOX_SCANNER_URL: ${OUTBOX_SCANNER_URL:-http://clamav-scanner:4120/scan}
      OUTBOX_SCANNER_BEARER_TOKEN: ${OUTBOX_SCANNER_BEARER_TOKEN:-}
      OUTBOX_FILE_SCAN_RESULT_BASE_URL: http://api-gateway:4100/api/v1
      OUTBOX_FILE_SCAN_RESULT_BEARER_TOKEN: ${FILE_SCAN_CALLBACK_TOKEN:-local-dev-service-admin-key}
      OUTBOX_POLL_INTERVAL_MS: 10000
      OUTBOX_BATCH_SIZE: 50

  clamav-scanner:
    build:
      context: .
      target: api-gateway
    command: ["node", "apps/outbox-worker/dist/clamav-scanner.main.js"]
    depends_on:
      clamav:
        condition: service_healthy
    environment:
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      CLAMAV_SCANNER_HTTP_PORT: 4120
      CLAMAV_MAX_FILE_BYTES: 20971520
    ports:
      - "14120:4120"
    # The scanner downloads attachment bytes from signed S3 URLs issued by the
    # api-gateway with the kubernetes.docker.internal endpoint.
    extra_hosts:
      - "kubernetes.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4120/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  clamav:
    image: clamav/clamav:1.4
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "printf 'zPING\\0' | nc -w 2 127.0.0.1 3310 | grep -q PONG"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: support_communication
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support
    ports:
      - "56432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support -d support_communication"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-password
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mc alias set local http://minio:9000 minio minio-password
      && mc mb --ignore-existing local/support-communication-local"

  mailpit:
    image: axllent/mailpit:v1.22
    ports:
      - "11025:1025"
      - "18025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  api-gateway-runtime:
  clamav-data:
  postgres-data:
  redis-data:
  minio-data:
