name: Publish production images

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  artifact-metadata: write
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: frontend
            target: frontend-production
          - image: api
            target: api-gateway
          - image: migrations
            target: backend-migrations
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Set immutable image reference
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          image_name="ghcr.io/${repository}-${{ matrix.image }}"
          echo "IMAGE_NAME=${image_name}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${image_name}:sha-${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"
          echo "LOCAL_IMAGE=support-communication/${{ matrix.image }}:scan-${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.image }} for vulnerability scan
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          load: true
          tags: ${{ env.LOCAL_IMAGE }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Block fixable high and critical vulnerabilities
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ env.LOCAL_IMAGE }}
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          output-format: table

      - name: Build and publish ${{ matrix.image }}
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ env.IMAGE_REF }}
          labels: |
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Sign and publish GitHub provenance attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
          create-storage-record: false
