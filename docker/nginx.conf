server {
  listen 80;
  server_name _;

  # Docker replaces a service IP on container recreation; resolve it per request.
  resolver 127.0.0.11 ipv6=off valid=10s;

  root /usr/share/nginx/html;
  index index.html;

  # React still uses dynamic style attributes, so style-src temporarily keeps
  # unsafe-inline. Scripts remain strict: no inline code and no eval.
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; manifest-src 'self'; worker-src 'self' blob:;" always;

  location = /api/v1/realtime/events/stream {
    set $api_gateway_upstream api-gateway:4100;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Accel-Buffering no;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$api_gateway_upstream$request_uri;
  }

  location /api/ {
    set $api_gateway_upstream api-gateway:4100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$api_gateway_upstream$request_uri;
  }

  # Same-origin загрузка файлов в minio: браузер шлёт подписанный PUT на
  # /s3/<bucket>/<key>?X-Amz-…, nginx снимает префикс и проксирует в minio.
  # Прямой PUT на kubernetes.docker.internal:19000 не работал: его блокирует
  # наш же CSP (connect-src 'self'), а с чужих устройств ещё и DNS/фаервол.
  # Host обязан совпадать с хостом, которым api-gateway ПОДПИСАЛ URL
  # (S3_ENDPOINT гейтвея в docker-compose.yml) — иначе SignatureDoesNotMatch.
  location /s3/ {
    set $minio_upstream minio:9000;
    client_max_body_size 64m;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_set_header Host "kubernetes.docker.internal:19000";
    rewrite ^/s3/(.*)$ /$1 break;
    proxy_pass http://$minio_upstream;
  }

  # Independent service-admin MPA entry (path routing).
  location /service-admin {
    try_files $uri $uri/ /service-admin/index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
